databases:
  - name: mentorship-db
    databaseName: mentorship
    user: mentorship_user
    plan: free

services:
  - type: web
    name: mentorconnect-web
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerCommand: start-web
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_LOCALE
        value: fr
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_FAKER_LOCALE
        value: fr_FR
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: mentorship-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mentorship-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mentorship-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mentorship-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mentorship-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: sync
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: REVERB_APP_ID
        sync: false
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REVERB_HOST
        sync: false
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https
      - key: REVERB_SERVER_HOST
        value: 0.0.0.0
      - key: REVERB_SERVER_PORT
        value: "10000"
      - key: VITE_REVERB_APP_KEY
        sync: false
      - key: VITE_REVERB_HOST
        sync: false
      - key: VITE_REVERB_PORT
        value: "443"
      - key: VITE_REVERB_SCHEME
        value: https

  - type: web
    name: mentorconnect-reverb
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerCommand: start-reverb
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: mentorship-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mentorship-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mentorship-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mentorship-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mentorship-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: APP_KEY
        sync: false
      - key: REVERB_APP_ID
        sync: false
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REVERB_HOST
        sync: false
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https
      - key: REVERB_SERVER_HOST
        value: 0.0.0.0
      - key: REVERB_SERVER_PORT
        value: "10000"
